version: 2

project_name: unearth

before:
  hooks:
    - go mod tidy

builds:
  - id: unearth
    main: ./cmd/unearth
    binary: unearth
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/unearth-tool/unearth/internal/httpclient.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: unearth-mcp
    main: ./cmd/unearth-mcp
    binary: unearth-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/unearth-tool/unearth/internal/httpclient.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - unearth
      - unearth-mcp
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  source:
    use: github
  use: github

release:
  draft: false
  name_template: "unearth {{ .Tag }}"
  header: |
    See [CHANGELOG.md](https://github.com/bugsyhewitt/unearth/blob/main/CHANGELOG.md) for full release notes.
